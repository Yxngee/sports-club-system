<!DOCTYPE html>
<html>

<head>
    <title>Sports System</title>
</head>

<body>

    <h1>Purchase Orders</h1>

    <form action="/create" method="POST">
        <select name="user">
            <option>coach1</option>
            <option>manager1</option>
            <option>player1</option>
        </select>
        <button type="submit">Create Order</button>
    </form>

    <hr>

    {% for order in orders %}
    <p>
        Order {{ order.id }} - {{ order.created_by }} - {{ order.status }}
        {% if order.status == "Pending" %}
        <a href="/approve/{{ order.id }}">Approve</a>
        {% endif %}
    </p>
    {% endfor %}

</body>

</html>
