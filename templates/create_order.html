{% extends "base.html" %}
{% block content %}

<h2>Create Purchase Order</h2>

<form method="POST" class="card p-4 shadow mt-3">
    <label>Select Item</label>
    <select class="form-control mb-3" name="item_id" required>
        {% for item in items %}
        <option value="{{ item.id }}">
            {{ item.name }} | Category: {{ item.category }} | Current Stock: {{ item.quantity }} | €{{
            "%.2f"|format(item.price) }}
        </option>
        {% endfor %}
    </select>

    <label>Quantity to Order</label>
    <input class="form-control mb-3" type="number" name="quantity" min="1" required>

    <button class="btn btn-primary">Submit Purchase Order</button>
</form>

<hr>

<h4>Available Items</h4>

<div class="row">
    {% for item in items %}
    <div class="col-md-3 mb-4">
        <div class="card shadow h-100">
            <img src="{{ url_for('static', filename='images/' + item.image) }}" class="card-img-top p-4"
                style="height:140px; object-fit:contain;">
            <div class="card-body">
                <h6>{{ item.name }}</h6>
                <p>Stock: {{ item.quantity }}</p>
                <p>€{{ "%.2f"|format(item.price) }}</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
