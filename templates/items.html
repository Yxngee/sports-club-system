{% extends "base.html" %}
{% block content %}

<h2>Inventory Items</h2>

<table class="table table-bordered table-striped mt-3">
    <tr class="table-dark">
        <th>ID</th>
        <th>Name</th>
        <th>Category</th>
        <th>Quantity</th>
        <th>Price</th>
    </tr>

    {% for item in items %}
    <tr>
        <td>{{ item.id }}</td>
        <td>{{ item.name }}</td>
        <td>{{ item.category }}</td>
        <td>{{ item.quantity }}</td>
        <td>€{{ "%.2f"|format(item.price) }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
