<h2>Inventory Items</h2>

{% extends "base.html" %}
{% block content %}

<h2>Inventory Items</h2>

<div class="row">
    {% for item in items %}
    <div class="col-md-3 mb-4">
        <div class="card shadow h-100">
            <img src="{{ url_for('static', filename='images/' + item.image) }}" class="card-img-top p-4"
                style="height:160px; object-fit:contain;">

            <div class="card-body">
                <h5>{{ item.name }}</h5>
                <p><strong>Category:</strong> {{ item.category }}</p>
                <p><strong>Stock:</strong> {{ item.quantity }}</p>
                <p><strong>Price:</strong> €{{ "%.2f"|format(item.price) }}</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
